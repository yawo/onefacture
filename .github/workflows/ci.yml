name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Run unit tests
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Enforce coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | tail -n 1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 60) { print "Coverage below 60% floor"; exit 1 } }'
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  go-build:
    name: Go build & docker
    runs-on: ubuntu-latest
    needs: [go-lint, go-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Build binary
        run: go build -trimpath -o bin/onefacture-api ./cmd/api
      - name: Build Docker image
        run: docker build -t onefacture/api:ci -f deploy/Dockerfile .

  python-sidecar:
    name: Python sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Lint
        working-directory: sidecar
        run: ruff check app tests
      - name: Test
        working-directory: sidecar
        run: pytest -q
