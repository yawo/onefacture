name: External Acceptance

on:
  workflow_dispatch:
    inputs:
      gate:
        description: "Acceptance gate to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - live-pa
          - public-sandbox
          - sdk-registries
          - kms-broker
          - outcome-metrics

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      ONEFACTURE_CHORUS_BASE_URL: ${{ vars.ONEFACTURE_CHORUS_BASE_URL }}
      ONEFACTURE_CHORUS_ACCESS_TOKEN: ${{ secrets.ONEFACTURE_CHORUS_ACCESS_TOKEN }}
      ONEFACTURE_DOCAPOSTE_BASE_URL: ${{ vars.ONEFACTURE_DOCAPOSTE_BASE_URL }}
      ONEFACTURE_DOCAPOSTE_API_TOKEN: ${{ secrets.ONEFACTURE_DOCAPOSTE_API_TOKEN }}
      ONEFACTURE_PENNYLANE_BASE_URL: ${{ vars.ONEFACTURE_PENNYLANE_BASE_URL }}
      ONEFACTURE_PENNYLANE_API_TOKEN: ${{ secrets.ONEFACTURE_PENNYLANE_API_TOKEN }}
      ONEFACTURE_SANDBOX_URL: ${{ vars.ONEFACTURE_SANDBOX_URL }}
      ONEFACTURE_KMS_URL: ${{ vars.ONEFACTURE_KMS_URL }}
      ONEFACTURE_KMS_TOKEN: ${{ secrets.ONEFACTURE_KMS_TOKEN }}
      ONEFACTURE_PROD_API_URL: ${{ vars.ONEFACTURE_PROD_API_URL }}
      ONEFACTURE_PROD_API_KEY: ${{ secrets.ONEFACTURE_PROD_API_KEY }}
      ONEFACTURE_MIN_RETRIED_INVOICES: ${{ vars.ONEFACTURE_MIN_RETRIED_INVOICES }}
      ONEFACTURE_BASELINE_RETRY_SUCCESS_RATE: ${{ vars.ONEFACTURE_BASELINE_RETRY_SUCCESS_RATE }}
      ONEFACTURE_EVIDENCE_OPERATOR: ${{ vars.ONEFACTURE_EVIDENCE_OPERATOR || github.actor }}
      ONEFACTURE_EVIDENCE_ENVIRONMENT: ${{ vars.ONEFACTURE_EVIDENCE_ENVIRONMENT }}
      ONEFACTURE_EVIDENCE_LINKS: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check external acceptance environment
        run: bash scripts/check_external_acceptance_env.sh "${{ inputs.gate }}"
      - name: Run external acceptance gate
        if: inputs.gate != 'all'
        run: bash scripts/verify_external_acceptance.sh "${{ inputs.gate }}"
      - name: Collect external evidence bundle
        if: inputs.gate == 'all'
        run: bash scripts/collect_external_acceptance_evidence.sh "$(date -u +%F)-github-${{ github.run_id }}"
      - name: Upload external evidence bundle
        if: always() && inputs.gate == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: external-acceptance-evidence-${{ github.run_id }}
          path: docs/operations/evidence/*-github-${{ github.run_id }}-external-acceptance
