name: Sandbox Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1-5"

permissions:
  contents: read

jobs:
  public-sandbox:
    runs-on: ubuntu-latest
    if: ${{ vars.ONEFACTURE_SANDBOX_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run public sandbox quickstart smoke test
        env:
          ONEFACTURE_SANDBOX_URL: ${{ vars.ONEFACTURE_SANDBOX_URL }}
        run: bash scripts/smoke_public_sandbox.sh

  live-pa-sandboxes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run live PA sandbox round-trips
        env:
          ONEFACTURE_CHORUS_BASE_URL: ${{ vars.ONEFACTURE_CHORUS_BASE_URL }}
          ONEFACTURE_CHORUS_ACCESS_TOKEN: ${{ secrets.ONEFACTURE_CHORUS_ACCESS_TOKEN }}
          ONEFACTURE_DOCAPOSTE_BASE_URL: ${{ vars.ONEFACTURE_DOCAPOSTE_BASE_URL }}
          ONEFACTURE_DOCAPOSTE_API_TOKEN: ${{ secrets.ONEFACTURE_DOCAPOSTE_API_TOKEN }}
          ONEFACTURE_PENNYLANE_BASE_URL: ${{ vars.ONEFACTURE_PENNYLANE_BASE_URL }}
          ONEFACTURE_PENNYLANE_API_TOKEN: ${{ secrets.ONEFACTURE_PENNYLANE_API_TOKEN }}
          ONEFACTURE_REQUIRE_LIVE_PA: "true"
        run: go test -tags=live_pa ./internal/adapters/live -count=1 -v
