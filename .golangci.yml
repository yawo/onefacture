run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocyclo
    - misspell
    - revive
    - bodyclose
    - gosec
    - unconvert
    - unparam
    - whitespace

linters-settings:
  gocyclo:
    min-complexity: 18
  revive:
    rules:
      - name: exported
        arguments: ["disableStutteringCheck"]
      - name: var-naming
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: context-as-argument
      - name: context-keys-type
      - name: time-naming
      - name: errorf
      - name: indent-error-flow
  gosec:
    excludes:
      - G104 # we wrap or log errors centrally
      - G404 # math/rand acceptable for non-crypto paths

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocyclo
