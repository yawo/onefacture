apiVersion: v1
kind: Service
metadata:
  name: {{ include "onefacture.fullname" . }}
  labels: {{- include "onefacture.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector: {{- include "onefacture.selectorLabels" . | nindent 4 }}
