openapi: 3.1.0
info:
  title: onefacture API
  version: 0.1.0
  description: |
    Unified API for French B2B electronic invoicing (Factur-X / EN 16931).
    onefacture abstracts the dozens of PDP (Plateformes de Dématérialisation Partenaires)
    behind a single REST API.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: http://localhost:8080
    description: Local dev
security:
  - apiKey: []
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Profile:
      type: string
      enum: [MINIMUM, BASIC, EN16931, EXTENDED]
    Status:
      type: string
      enum: [DRAFT, VALIDATED, SUBMITTED, RECEIVED, ACCEPTED, REJECTED, PAID, CANCELLED]
    Party:
      type: object
      required: [name, address]
      properties:
        name: { type: string }
        legal_name: { type: string }
        siren: { type: string, minLength: 9, maxLength: 9 }
        siret: { type: string, minLength: 14, maxLength: 14 }
        vat_number: { type: string }
        address:
          type: object
          required: [line1, postal_code, city, country_code]
          properties:
            line1: { type: string }
            line2: { type: string }
            postal_code: { type: string }
            city: { type: string }
            country_code: { type: string, minLength: 2, maxLength: 2 }
    Line:
      type: object
      required: [description, quantity, unit_code, unit_price, tax_rate, tax_category]
      properties:
        description: { type: string }
        quantity: { type: number, format: float }
        unit_code: { type: string }
        unit_price: { type: number, format: float }
        tax_rate: { type: number, format: float }
        tax_category: { type: string }
    Invoice:
      type: object
      required: [profile, type_code, number, currency, issue_date, seller, buyer, lines]
      properties:
        id: { type: string, format: uuid }
        profile: { $ref: "#/components/schemas/Profile" }
        type_code: { type: string, enum: ["380", "381", "384"] }
        number: { type: string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        issue_date: { type: string, format: date }
        due_date: { type: string, format: date }
        seller: { $ref: "#/components/schemas/Party" }
        buyer: { $ref: "#/components/schemas/Party" }
        lines:
          type: array
          items: { $ref: "#/components/schemas/Line" }
        status: { $ref: "#/components/schemas/Status" }
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }
paths:
  /healthz:
    get:
      summary: Liveness probe
      security: []
      responses:
        "200": { description: ok }
  /v1/platforms:
    get:
      summary: List supported PA platforms
      security: []
      responses:
        "200": { description: list }
  /v1/invoices:
    post:
      summary: Create and validate an invoice (optionally submit to PA)
      parameters:
        - in: query
          name: submit
          schema: { type: boolean }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Invoice" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
        "400": { description: bad request, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
        "422": { description: validation failed }
    get:
      summary: List invoices
      parameters:
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/Status" }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: list }
  /v1/invoices/{id}:
    get:
      summary: Fetch one invoice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: ok }
        "404": { description: not found }
  /v1/invoices/{id}/submit:
    post:
      summary: Submit a previously created invoice to its PA
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202": { description: accepted }
        "409": { description: invalid status transition }
  /v1/invoices/{id}/events:
    get:
      summary: Lifecycle events for an invoice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: ok }
  /v1/inbox:
    get:
      summary: List received invoices
      responses:
        "200": { description: ok }
  /v1/inbox/{id}/approve:
    post:
      summary: Approve a received invoice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: ok }
  /v1/validate:
    post:
      summary: Validate raw CII/UBL/Factur-X XML
      requestBody:
        required: true
        content:
          application/xml: { schema: { type: string, format: binary } }
      responses:
        "200": { description: report }
  /v1/directory/lookup:
    get:
      summary: Resolve a SIREN to its registered PA
      parameters:
        - in: query
          name: siren
          required: true
          schema: { type: string }
      responses:
        "200": { description: ok }
  /v1/webhooks:
    post:
      summary: Register an outbound webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, secret]
              properties:
                url: { type: string, format: uri }
                secret: { type: string, minLength: 16 }
                events:
                  type: array
                  items: { type: string }
      responses:
        "201": { description: created }
  /v1/data/export:
    post:
      summary: GDPR data export (Article 20)
      responses:
        "200": { description: archive metadata }
  /v1/data/erase:
    post:
      summary: GDPR data erasure (Article 17)
      responses:
        "202": { description: erasure requested }
